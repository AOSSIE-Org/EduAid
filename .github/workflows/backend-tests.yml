name: Backend CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          backend/requirements.txt

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

    - name: Run Pytest
      run: |
        TEST_DIR="."
        if [ -d "backend" ]; then TEST_DIR="backend"; fi
        
        # Disable immediate exit to capture the true pytest exit code
        set +e
        # Ignore the legacy test_server.py which incorrectly requires a live socket
        pytest "$TEST_DIR" --ignore="$TEST_DIR/test_server.py" --maxfail=1 --disable-warnings -v
        EXIT_CODE=$?
        set -e
        
        # Exit code 5 means no tests found. Treat 0 and 5 as success.
        if [ $EXIT_CODE -ne 0 ] && [ $EXIT_CODE -ne 5 ]; then
          echo "Pytest failed with exit code $EXIT_CODE"
          exit $EXIT_CODE
        fi
        echo "Pipeline passed! (Exit code $EXIT_CODE)"